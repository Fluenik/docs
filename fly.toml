app = "fluenik-docs-bram"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  # Docs apps are always-on. ``auto_stop_machines = "off"`` keeps Fly Proxy
  # from suspending/stopping idle machines; ``auto_start_machines = true`` is
  # kept on so a crashed/stopped machine can be brought back by traffic or by
  # ``fly machine start``. Replica count is managed via ``fly scale count``.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
